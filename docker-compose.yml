version: '3.8'

services:
  solver-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hungarian-solver-container
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=production
      - DB_TYPE=postgres # Can be toggled and configured
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres_secure_pass
      - DB_DATABASE=hungarian_db
    depends_on:
      - postgres-db
    restart: always

  postgres-db:
    image: postgres:15-alpine
    container_name: hungarian-solver-db
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres_secure_pass
      - POSTGRES_DB=hungarian_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

volumes:
  postgres_data:
